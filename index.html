<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taufik Rahman | Sistem Informasi Manajemen Perikanan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #080b12 0%, #0a192f 50%, #001d3d 100%);
            background-size: 300% 300%;
            overflow: hidden;
            position: relative;
            animation: moveBg 10s ease infinite, color_explosion 4s infinite;
        }

        @keyframes color_explosion {
            0%, 44% { filter: hue-rotate(0deg) contrast(100%); }
            44.5% { filter: hue-rotate(45deg) contrast(150%) brightness(120%); } 
            46%, 100% { filter: hue-rotate(0deg) contrast(100%); }
        }

        @keyframes moveBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- 1. HUJAN BADAI --- */
        body::after {
            content: "";
            position: absolute;
            top: -100%; left: -100%; width: 300%; height: 300%;
            background-image: linear-gradient(rgba(255,255,255,0.3) 1px, transparent 1px);
            background-size: 2px 40px;
            z-index: 5;
            transform: rotate(25deg);
            animation: rain_wind 0.15s linear infinite;
            pointer-events: none;
        }

        @keyframes rain_wind {
            0% { background-position: 0 0; }
            100% { background-position: 0 1000px; }
        }

        /* --- 2. GELOMBANG LAUT --- */
        .waves {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 15vh;
            min-height: 100px; max-height: 150px; z-index: 15;
        }
        .parallax > use { animation: move-forever 25s cubic-bezier(.55,.5,.45,.5) infinite; }
        .parallax > use:nth-child(1) { animation-delay: -2s; animation-duration: 7s; fill: rgba(0, 242, 255, 0.3); }
        .parallax > use:nth-child(2) { animation-delay: -3s; animation-duration: 10s; fill: rgba(0, 86, 179, 0.5); }
        .parallax > use:nth-child(3) { animation-delay: -4s; animation-duration: 13s; fill: rgba(0, 29, 61, 0.8); }
        .parallax > use:nth-child(4) { animation-delay: -5s; animation-duration: 20s; fill: #001d3d; }
        @keyframes move-forever { 0% { transform: translate3d(-90px,0,0); } 100% { transform: translate3d(85px,0,0); } }

        /* --- 3. KABUT & KILAT --- */
        .fog {
            position: absolute; top: 0; left: -100%; width: 300%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 242, 255, 0.08) 0%, transparent 50%);
            background-size: 800px 100%; animation: fog_move 5s linear infinite; z-index: 1; pointer-events: none;
        }
        @keyframes fog_move { 0% { background-position: 0 0; } 100% { background-position: 800px 0; } }

        .flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; opacity: 0; z-index: 2; animation: bg_flash 4s infinite;
        }
        @keyframes bg_flash { 44% { opacity: 0; } 44.5% { opacity: 0.8; } 45% { opacity: 0; } 45.5% { opacity: 0.9; } 46% { opacity: 0; } }

        /* --- 4. PETIR TIGA ARAH --- */
        .bolt {
            position: absolute; top: 0; height: 100vh; background: #fff;
            clip-path: polygon(50% 0%, 20% 40%, 60% 40%, 10% 100%, 80% 30%, 40% 30%);
            opacity: 0; z-index: 3; animation: strike 4s infinite;
        }
        .bolt-left { left: 10%; width: 90px; filter: drop-shadow(0 0 30px #00ffff); }
        .bolt-right { right: 10%; width: 90px; transform: scaleX(-1); animation-delay: 0.1s; filter: drop-shadow(0 0 30px #00ffff); }
        .bolt-main { left: 45%; width: 150px; animation-delay: 0.05s; filter: drop-shadow(0 0 100px #fff); }
        @keyframes strike { 0%, 44% { opacity: 0; transform: scaleY(0); } 44.5% { opacity: 1; transform: scaleY(1) scale(1.5); } 46%, 100% { opacity: 0; } }

        /* --- 5. KARTU GLASSMORPISM (TANPA RGB BORDER) --- */
        .glass-card {
            background: rgba(10, 15, 30, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 45px;
            width: 350px;
            text-align: center;
            color: white;
            z-index: 20;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
            /* Efek bayangan biru neon yang dalam */
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0, 242, 255, 0.2);
            animation: earthquake 4s infinite, pulseGlow 3s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); border-color: rgba(255,255,255,0.1); }
            100% { box-shadow: 0 0 50px rgba(0, 242, 255, 0.5); border-color: rgba(0, 242, 255, 0.5); }
        }

        @keyframes earthquake {
            0%, 44% { transform: translate(0, 0) scale(1); }
            44.5% { transform: translate(12px, -12px) rotate(4deg) scale(1.05); }
            45% { transform: translate(-12px, 12px) rotate(-4deg) scale(1.05); }
            46%, 100% { transform: translate(0, 0) scale(1); }
        }

        /* --- 6. GLITCH TEKS --- */
        h1 { 
            font-size: 32px; letter-spacing: 3px; color: #fff; position: relative;
            animation: text_glow 4s infinite; text-transform: uppercase; margin-top: 0;
        }
        h1::before, h1::after { content: "PANGKALAN TUGAS"; position: absolute; top: 0; left: 0; width: 100%; opacity: 0.7; }
        h1::before { color: #00ffff; z-index: -1; animation: glitch-1 2s infinite linear alternate-reverse; }
        h1::after { color: #ff00ff; z-index: -2; animation: glitch-2 3s infinite linear alternate-reverse; }
        @keyframes glitch-1 { 0% { clip-path: inset(20% 0 80% 0); transform: translate(-3px, 1px); } 100% { clip-path: inset(30% 0 50% 0); transform: translate(3px, -1px); } }
        @keyframes glitch-2 { 0% { clip-path: inset(10% 0 60% 0); transform: translate(3px, -1px); } 100% { clip-path: inset(5% 0 80% 0); transform: translate(-3px, 1px); } }

        /* --- 7. TOMBOL MODERN --- */
        .btn {
            display: block; text-decoration: none; color: white;
            background: rgba(255, 255, 255, 0.03); padding: 18px;
            border-radius: 15px; margin-bottom: 18px; font-weight: 700;
            letter-spacing: 2px; transition: 0.3s;
            border: 1px solid rgba(0, 242, 255, 0.3); text-transform: uppercase;
            position: relative; overflow: hidden;
        }
        .btn::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }
        .btn:hover::after { left: 100%; }
        .btn:hover {
            background: #00f2ff; color: #080b12;
            transform: scale(1.1); box-shadow: 0 0 30px #00f2ff;
        }

        .mantap-menn {
            margin-top: 25px; font-size: 18px; font-weight: 900;
            color: #00f2ff; text-shadow: 0 0 15px #00f2ff;
            animation: pulseText 0.8s infinite alternate;
        }
        @keyframes pulseText { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.2); opacity: 1; } }
    </style>
</head>
<body>

    <div class="fog"></div>
    <div class="flash"></div>
    
    <div class="bolt bolt-left"></div>
    <div class="bolt bolt-main"></div>
    <div class="bolt bolt-right"></div>

    <div class="glass-card">
        <h1>SISTEM INFORMASI MANAJEMEN PERIKANAN</h1>
        <p style="font-weight: 600; opacity: 0.8; margin-bottom: 35px;">Taufik Rahman | 2310715210008</p>
        
        <a href="tugas1/index.html" class="btn">Tugas 1</a>
        <a href="tugas2/index.html" class="btn">Tugas 2</a>
        <a href="tugas3.html" class="btn">Tugas 3</a>

        <div class="mantap-menn">SOSIAL EKONOMI PERIKANAN</div>
    </div>

    <!-- GELOMBANG LAUT -->
    <svg class="waves" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
    viewBox="0 24 150 28" preserveAspectRatio="none" shape-rendering="auto">
        <defs>
            <path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
        </defs>
        <g class="parallax">
            <use xlink:href="#gentle-wave" x="48" y="0" />
            <use xlink:href="#gentle-wave" x="48" y="3" />
            <use xlink:href="#gentle-wave" x="48" y="5" />
            <use xlink:href="#gentle-wave" x="48" y="7" />
        </g>
    </svg>

</body>
</html>
