<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Tugas Taufik Rahman | Ultimate Storm</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            overflow: hidden;
            position: relative;
        }

        /* --- HUJAN RINTIK --- */
        body::after {
            content: "";
            position: absolute;
            top: -100%; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 2px 50px;
            z-index: 0;
            animation: rain 0.3s linear infinite;
        }

        @keyframes rain {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }

        /* --- KILATAN CAHAYA --- */
        .flash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            opacity: 0;
            z-index: 1;
            pointer-events: none;
            animation: bg_flash 4s infinite;
        }

        /* --- PETIR MENYAMBAR --- */
        .bolt {
            position: absolute;
            top: 0; width: 80px; height: 100vh;
            background: #fff;
            clip-path: polygon(50% 0%, 20% 40%, 60% 40%, 10% 100%, 80% 30%, 40% 30%);
            opacity: 0; z-index: 2;
            filter: drop-shadow(0 0 20px #00ffff);
            animation: strike 4s infinite;
        }
        .bolt-left { left: 15%; animation-delay: 0s; }
        .bolt-right { right: 15%; animation-delay: 0.1s; transform: scaleX(-1); }

        @keyframes bg_flash {
            44% { opacity: 0; }
            45% { opacity: 0.2; }
            46% { opacity: 0; }
            47% { opacity: 0.3; }
            48% { opacity: 0; }
        }

        @keyframes strike {
            0%, 44% { opacity: 0; transform: scaleY(0); }
            44.5% { opacity: 1; transform: scaleY(1); }
            46%, 100% { opacity: 0; }
        }

        /* --- KARTU UTAMA DENGAN EFEK GUNCANG --- */
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            width: 340px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            color: white;
            z-index: 10;
            animation: shake 4s infinite; /* Kartu ikut bergetar pas petir */
        }

        @keyframes shake {
            0%, 44% { transform: translate(0, 0); }
            44.5% { transform: translate(2px, -2px); }
            45% { transform: translate(-2px, 2px); }
            45.5% { transform: translate(0, 0); }
        }

        h1 { font-size: 26px; margin-bottom: 5px; letter-spacing: 2px; }
        p { font-size: 14px; margin-bottom: 30px; opacity: 0.6; }

        .btn {
            display: block;
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.05);
            padding: 16px;
            border-radius: 15px;
            margin-bottom: 15px;
            font-weight: 600;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn:hover {
            background: #fff;
            color: #0f172a;
            transform: scale(1.05);
        }

        .btn-locked { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="flash"></div>
    <div class="bolt bolt-left"></div>
    <div class="bolt bolt-right"></div>

    <div class="glass-card">
        <h1 style="color: #00f2ff;"> PORTAL TUGAS</h1>
        <p>Taufik Rahman | 2310715210008</p>
        
        <a href="tugas1/index.html" class="btn">Tugas 1: Biodata Diri</a>
        <a href="tugas2/index.html" class="btn">Tugas 2: Manajemen Data</a>
        <a href="#" class="btn btn-locked">Tugas 3: (Soon)</a>

        <div style="margin-top: 20px; font-size: 10px; opacity: 0.4;">Prodi Fishery Extension</div>
    </div>

</body>
</html>
