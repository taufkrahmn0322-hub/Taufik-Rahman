<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Tugas Taufik Rahman | God Level Storm</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1e293b 0%, #080b12 100%);
            overflow: hidden;
            position: relative;
        }

        /* --- 1. HUJAN MIRING TERTIUP ANGIN (BARU) --- */
        body::after {
            content: "";
            position: absolute;
            top: -100%; left: -100%; width: 300%; height: 300%;
            background-image: linear-gradient(rgba(255,255,255,0.2) 1px, transparent 1px);
            background-size: 2px 60px;
            z-index: 0;
            transform: rotate(20deg); /* Kemiringan angin */
            animation: rain_wind 0.3s linear infinite;
            pointer-events: none;
        }

        @keyframes rain_wind {
            0% { background-position: 0 0; }
            100% { background-position: 0 1000px; }
        }

        /* --- 2. KABUT BERGERAK (BARU) --- */
        .fog {
            position: absolute;
            top: 0; left: -100%; width: 300%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.03) 0%, transparent 50%);
            background-size: 800px 100%;
            animation: fog_move 12s linear infinite;
            z-index: 1; 
            pointer-events: none;
        }

        @keyframes fog_move {
            0% { background-position: 0 0; }
            100% { background-position: 800px 0; }
        }

        /* --- 3. KILATAN CAHAYA (YANG LAMA) --- */
        .flash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            opacity: 0;
            z-index: 2;
            pointer-events: none;
            animation: bg_flash 4s infinite;
        }

        /* --- 4. PETIR MENYAMBAR (YANG LAMA) --- */
        .bolt {
            position: absolute;
            top: 0; width: 80px; height: 100vh;
            background: #fff;
            clip-path: polygon(50% 0%, 20% 40%, 60% 40%, 10% 100%, 80% 30%, 40% 30%);
            opacity: 0; z-index: 3;
            filter: drop-shadow(0 0 20px #00ffff) drop-shadow(0 0 40px #00ffff);
            animation: strike 4s infinite;
        }
        .bolt-left { left: 15%; animation-delay: 0s; }
        .bolt-right { right: 15%; animation-delay: 0.1s; transform: scaleX(-1); }

        @keyframes bg_flash {
            44% { opacity: 0; }
            45% { opacity: 0.3; }
            46% { opacity: 0; }
            47% { opacity: 0.4; }
            48% { opacity: 0; }
        }

        @keyframes strike {
            0%, 44% { opacity: 0; transform: scaleY(0) rotate(0deg); }
            44.5% { opacity: 1; transform: scaleY(1) rotate(5deg); } /* Agak miring dikit ngikutin angin */
            46%, 100% { opacity: 0; }
        }

        /* --- 5. KARTU UTAMA DENGAN EFEK GUNCANG (YANG LAMA) --- */
        .glass-card {
            background: rgba(10, 15, 30, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 40px;
            width: 340px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7);
            color: white;
            z-index: 10;
            position: relative;
            animation: shake 4s infinite;
        }

        @keyframes shake {
            0%, 44% { transform: translate(0, 0); }
            44.5% { transform: translate(3px, -3px) rotate(1deg); }
            45% { transform: translate(-3px, 3px) rotate(-1deg); }
            45.5% { transform: translate(0, 0); }
        }

        /* --- 6. TEKS NEON TERSAMBAR PETIR (BARU) --- */
        h1 { 
            font-size: 26px; 
            margin-bottom: 5px; 
            letter-spacing: 2px; 
            color: #00f2ff;
            animation: text_glow 4s infinite;
        }

        @keyframes text_glow {
            0%, 44% { text-shadow: 0 0 5px rgba(0,242,255,0.3); color: #00f2ff; }
            44.5% { text-shadow: 0 0 20px #00f2ff, 0 0 40px #fff; color: #fff; } /* Nyala terang pas petir */
            46%, 100% { text-shadow: 0 0 5px rgba(0,242,255,0.3); color: #00f2ff; }
        }

        p { font-size: 14px; margin-bottom: 30px; opacity: 0.6; }

        .btn {
            display: block;
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.05);
            padding: 16px;
            border-radius: 15px;
            margin-bottom: 15px;
            font-weight: 600;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn:hover {
            background: #fff;
            color: #0f172a;
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0, 242, 255, 0.4); /* Efek glowing pas kursor diarahkan */
        }

        .btn-locked { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="fog"></div>
    <div class="flash"></div>
    <div class="bolt bolt-left"></div>
    <div class="bolt bolt-right"></div>

    <div class="glass-card">
        <h1>⚡ PORTAL TUGAS</h1>
        <p>Taufik Rahman | 2310715210008</p>
        
        <a href="tugas1/index.html" class="btn">Tugas 1: Biodata Diri</a>
        <a href="tugas2/index.html" class="btn">Tugas 2: Manajemen Data</a>
        <a href="#" class="btn btn-locked">Tugas 3: (Coming Soon)</a>

        <div style="margin-top: 20px; font-size: 10px; opacity: 0.4;">Prodi Fishery Extension & Dev</div>
    </div>

</body>
</html>
