<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taufik Rahman | Sistem Informasi Manajemen Perikanan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Latar belakang gradient yang bisa bergerak */
            background: linear-gradient(135deg, #080b12 0%, #170b2b 50%, #001d3d 100%);
            background-size: 300% 300%;
            animation: moveBg 10s ease infinite;
            overflow: hidden;
            position: relative;
        }

        /* Animasi Background Bergerak */
        @keyframes moveBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- 1. HUJAN MIRING TERTIUP ANGIN --- */
        body::after {
            content: "";
            position: absolute;
            top: -100%; left: -100%; width: 300%; height: 300%;
            background-image: linear-gradient(rgba(255,255,255,0.3) 1px, transparent 1px); /* Hujan lebih tebal sedikit */
            background-size: 2px 50px;
            z-index: 0;
            transform: rotate(20deg);
            animation: rain_wind 0.25s linear infinite; /* Hujan lebih deras */
            pointer-events: none;
        }

        @keyframes rain_wind {
            0% { background-position: 0 0; }
            100% { background-position: 0 1000px; }
        }

        /* --- 2. KABUT BERGERAK --- */
        .fog {
            position: absolute;
            top: 0; left: -100%; width: 300%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 242, 255, 0.05) 0%, transparent 50%); /* Kabut agak kebiruan */
            background-size: 800px 100%;
            animation: fog_move 8s linear infinite;
            z-index: 1; 
            pointer-events: none;
        }

        @keyframes fog_move {
            0% { background-position: 0 0; }
            100% { background-position: 800px 0; }
        }

        /* --- 3. KILATAN CAHAYA --- */
        .flash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            opacity: 0;
            z-index: 2;
            pointer-events: none;
            animation: bg_flash 4s infinite;
        }

        /* --- 4. PETIR MENYAMBAR (DUA WARNA) --- */
        .bolt {
            position: absolute;
            top: 0; width: 80px; height: 100vh;
            background: #fff;
            clip-path: polygon(50% 0%, 20% 40%, 60% 40%, 10% 100%, 80% 30%, 40% 30%);
            opacity: 0; z-index: 3;
            animation: strike 4s infinite;
        }
        /* Petir kiri warna Magenta menyala */
        .bolt-left { 
            left: 15%; 
            animation-delay: 0s; 
            filter: drop-shadow(0 0 20px #ff00ff) drop-shadow(0 0 50px #ff00ff);
        }
        /* Petir kanan warna Cyan menyala */
        .bolt-right { 
            right: 15%; 
            animation-delay: 0.1s; 
            transform: scaleX(-1); 
            filter: drop-shadow(0 0 20px #00ffff) drop-shadow(0 0 50px #00ffff);
        }

        @keyframes bg_flash {
            44% { opacity: 0; }
            45% { opacity: 0.4; }
            46% { opacity: 0; }
            47% { opacity: 0.6; }
            48% { opacity: 0; }
        }

        @keyframes strike {
            0%, 44% { opacity: 0; transform: scaleY(0) rotate(0deg); }
            44.5% { opacity: 1; transform: scaleY(1) rotate(5deg) scale(1.2); } 
            46%, 100% { opacity: 0; }
        }

        /* --- 5. EFEK KELIP-KELIP TANPA PUTUS --- */
        .twinkle {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        
        .twinkle-1 {
            background-image: 
                radial-gradient(3px 3px at 15% 25%, #00f2ff 50%, transparent),
                radial-gradient(2px 2px at 45% 75%, #ff00ff 50%, transparent),
                radial-gradient(3px 3px at 75% 35%, #00f2ff 50%, transparent),
                radial-gradient(2px 2px at 85% 85%, #ff00ff 50%, transparent),
                radial-gradient(3px 3px at 30% 10%, #ffffff 50%, transparent);
            filter: drop-shadow(0 0 10px #00f2ff);
            animation: blink_fast 1s ease-in-out infinite alternate;
        }

        .twinkle-2 {
            background-image: 
                radial-gradient(2px 2px at 10% 80%, #ffffff 50%, transparent),
                radial-gradient(3px 3px at 55% 15%, #ff00ff 50%, transparent),
                radial-gradient(2px 2px at 80% 60%, #00f2ff 50%, transparent),
                radial-gradient(3px 3px at 25% 55%, #ffffff 50%, transparent),
                radial-gradient(2px 2px at 95% 20%, #00f2ff 50%, transparent);
            filter: drop-shadow(0 0 10px #ff00ff);
            animation: blink_slow 2s ease-in-out infinite alternate-reverse;
        }

        @keyframes blink_fast {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        @keyframes blink_slow {
            0% { opacity: 0.2; }
            100% { opacity: 1; }
        }

        /* --- 6. KARTU UTAMA DENGAN EFEK GUNCANG & GLOWING BERNAFAS --- */
        .glass-card {
            background: rgba(10, 15, 30, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            width: 340px;
            text-align: center;
            color: white;
            z-index: 10;
            position: relative;
            /* Menggabungkan efek guncang dan efek menyala */
            animation: shake 4s infinite, cardGlow 3s infinite alternate;
        }

        /* Efek Menyala berganti warna di sekeliling kartu */
        @keyframes cardGlow {
            0% { 
                box-shadow: 0 0 20px rgba(0, 242, 255, 0.4), inset 0 0 15px rgba(0, 242, 255, 0.2); 
                border: 2px solid rgba(0, 242, 255, 0.6); 
            }
            100% { 
                box-shadow: 0 0 40px rgba(255, 0, 255, 0.7), inset 0 0 25px rgba(255, 0, 255, 0.4); 
                border: 2px solid rgba(255, 0, 255, 0.8); 
            }
        }

        @keyframes shake {
            0%, 44% { transform: translate(0, 0); }
            44.5% { transform: translate(4px, -4px) rotate(2deg); }
            45% { transform: translate(-4px, 4px) rotate(-2deg); }
            45.5% { transform: translate(0, 0); }
        }

        /* --- 7. TEKS NEON TERSAMBAR PETIR (MAKIN MENYALA) --- */
        h1 { 
            font-size: 28px; 
            margin-bottom: 5px; 
            letter-spacing: 2px; 
            color: #fff;
            animation: text_glow 4s infinite, color_shift 3s infinite alternate;
        }

        /* Judul berubah warna pelan-pelan */
        @keyframes color_shift {
            0% { color: #00f2ff; }
            100% { color: #ff00ff; }
        }

        @keyframes text_glow {
            0%, 44% { text-shadow: 0 0 10px currentColor, 0 0 20px currentColor; }
            44.5% { text-shadow: 0 0 30px #fff, 0 0 60px #fff, 0 0 100px currentColor; color: #fff; transform: scale(1.1); } 
            46%, 100% { text-shadow: 0 0 10px currentColor, 0 0 20px currentColor; }
        }

        p { 
            font-size: 15px; 
            margin-bottom: 30px; 
            opacity: 0.9; 
            font-weight: 600;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        /* --- 8. TOMBOL SUPER GLOWING --- */
        .btn {
            display: block;
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.05);
            padding: 16px;
            border-radius: 15px;
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 242, 255, 0.3);
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.1);
        }

        /* Kilapan cahaya melewati tombol */
        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }

        .btn:hover::before {
            left: 150%;
        }

        .btn:hover {
            background: linear-gradient(45deg, #00f2ff, #0056b3);
            color: #fff;
            transform: scale(1.08) translateY(-3px);
            border-color: #00f2ff;
            box-shadow: 0 15px 30px rgba(0, 242, 255, 0.6), 0 0 20px rgba(0, 242, 255, 0.4) inset; 
            text-shadow: 0 0 5px rgba(255,255,255,0.8);
        }

        .btn-locked { opacity: 0.3; cursor: not-allowed; }

        /* Teks Mantap Menn */
        .mantap-menn {
            margin-top: 25px; 
            font-size: 14px; 
            font-weight: bold;
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
            animation: pulseText 1.5s infinite alternate;
        }

        @keyframes pulseText {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.1); }
        }
    </style>
</head>
<body>

    <div class="fog"></div>
    <div class="twinkle twinkle-1"></div>
    <div class="twinkle twinkle-2"></div>
    <div class="flash"></div>
    <div class="bolt bolt-left"></div>
    <div class="bolt bolt-right"></div>

    <div class="glass-card">
        <h1> PANGKALAN TUGAS</h1>
        <p>Taufik Rahman | 2310715210008</p>
        
        <a href="tugas1/index.html" class="btn">Tugas 1</a>
        <a href="tugas2/index.html" class="btn">Tugas 2</a>
        <a href="tugas3.html" class="btn">Tugas 3</a>

        <div class="mantap-menn">🚀 MANTAP MENN 🔥</div>
    </div>

</body>
</html>
