<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Tugas Taufik Rahman | Storm Version</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            overflow: hidden;
            position: relative;
        }

        /* --- EFEK KILATAN CAHAYA DI LATAR (Flash) --- */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #fff;
            opacity: 0;
            z-index: 1;
            pointer-events: none;
            /* DIUBAH JADI 4 DETIK BIAR LEBIH CEPAT */
            animation: background_flash 4s linear infinite; 
        }

        /* --- ANIMASI BENTUK PETIR MENYAMBAR --- */
        .bolt {
            position: absolute;
            top: 0;
            width: 70px;
            height: 100vh;
            background: #e0f7fa;
            clip-path: polygon(50% 0%, 20% 40%, 60% 40%, 10% 100%, 80% 30%, 40% 30%);
            opacity: 0;
            z-index: 2;
            pointer-events: none;
            filter: drop-shadow(0 0 15px #00ffff) drop-shadow(0 0 30px #fff);
            /* DIUBAH JADI 4 DETIK BIAR LEBIH CEPAT */
            animation: strike_down 4s linear infinite;
            transform-origin: top; 
        }

        .bolt-1 { left: 10%; }
        
        .bolt-2 { 
            right: 15%; 
            width: 50px;
            animation-delay: 0.1s; 
            transform: scaleX(-1); 
        }

        @keyframes background_flash {
            0%, 44% { opacity: 0; }
            45% { opacity: 0.3; background-color: #fff; } 
            46% { opacity: 0.1; }
            47% { opacity: 0.4; }
            48%, 100% { opacity: 0; }
        }

        @keyframes strike_down {
            0%, 44% { opacity: 0; transform: scaleY(0); } 
            44.5% { opacity: 1; transform: scaleY(1); } 
            45% { opacity: 0; } 
            45.5% { opacity: 1; } 
            46%, 100% { opacity: 0; transform: scaleY(1); } 
        }

        /* --- KARTU MENU (Kaca Transparan) --- */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 40px;
            width: 340px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            color: white;
            z-index: 10;
            position: relative;
        }

        h1 { font-size: 24px; margin-bottom: 8px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); letter-spacing: 1px; }
        p { font-size: 13px; margin-bottom: 30px; opacity: 0.7; }

        /* --- TOMBOL --- */
        .btn {
            display: block;
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.08);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            font-weight: 600;
            transition: 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn:hover {
            background: white;
            color: #1a253a;
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 8px 20px rgba(255,255,255,0.15);
        }

        .btn-locked {
            background: rgba(0, 0, 0, 0.3);
            color: rgba(255, 255, 255, 0.3);
            cursor: not-allowed;
        }

        .footer { font-size: 10px; margin-top: 20px; opacity: 0.4; }
    </style>
</head>
<body>

    <div class="bolt bolt-1"></div>
    <div class="bolt bolt-2"></div>

    <div class="glass-card">
        <h1>PORTAL TUGAS</h1>
        <p>Taufik Rahman | 2310715210008</p>
        
        <a href="tugas1/index.html" class="btn"> Tugas 1: Biodata Diri</a>
        <a href="tugas2/index.html" class="btn"> Tugas 2: Manajemen Data</a>
        <a href="#" class="btn btn-locked">Tugas 3: (Coming Soon)</a>

        <div class="footer">Fishery Extension & Development</div>
    </div>

</body>
</html>
