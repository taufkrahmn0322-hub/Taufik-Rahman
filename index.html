<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Tugas SIM Perikanan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Latar belakang gradient tema laut/alam */
            background: linear-gradient(135deg, #00b4db 0%, #0083b0 100%);
        }
        
        /* Efek kaca (Glassmorphism) */
        .glass-container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 40px;
            width: 350px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            color: white;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        p {
            font-size: 14px;
            margin-bottom: 30px;
            color: rgba(255, 255, 255, 0.9);
        }

        .menu-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            text-decoration: none;
            color: #0083b0;
            background: white;
            padding: 15px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            background: #e0f7fa;
        }

        .btn-disabled {
            background: rgba(255, 255, 255, 0.4);
            color: rgba(255, 255, 255, 0.8);
            cursor: not-allowed;
            box-shadow: none;
        }
        
        .btn-disabled:hover {
            transform: none;
            background: rgba(255, 255, 255, 0.4);
        }

        .footer-text {
            margin-top: 30px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>
<body>

    <div class="glass-container">
        <h1>Portal Tugas SIM</h1>
        <p>Taufik Rahman | 2310715210008</p>
        
        <div class="menu-wrapper">
            <a href="tugas1/index.html" class="btn">🌊 Tugas 1: Biodata Diri</a>
            
            <a href="#" class="btn btn-disabled">🌊 Tugas 2: (Segera Hadir)</a>
            <a href="#" class="btn btn-disabled">🌊 Tugas 3: (Segera Hadir)</a>
        </div>

        <div class="footer-text">
            Fishery Extension and Development
        </div>
    </div>

</body>
</html>
