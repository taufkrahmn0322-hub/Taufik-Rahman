<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas 4 | Taufik Rahman</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #080b12 0%, #0a192f 50%, #001d3d 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* --- HEADER --- */
        .header {
            text-align: center;
            margin-bottom: 30px;
            z-index: 10;
        }
        h1 { margin: 0; color: #00f2ff; text-transform: uppercase; letter-spacing: 2px; }
        p { opacity: 0.8; font-size: 14px; }

        /* --- TAB NAVIGASI --- */
        .tab-container {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            z-index: 10;
            flex-wrap: wrap;
            justify-content: center;
        }
        .tab-btn {
            padding: 12px 20px;
            border: 1px solid #00f2ff;
            background: rgba(0, 242, 255, 0.05);
            color: #00f2ff;
            cursor: pointer;
            font-weight: 600;
            border-radius: 8px;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 12px;
        }
        .tab-btn.active {
            background: #00f2ff;
            color: #080b12;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
        }

        /* --- KONTEN AREA --- */
        .glass-card {
            background: rgba(10, 15, 30, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            width: 100%;
            max-width: 1000px;
            height: 650px;
            border: 1px solid rgba(0, 242, 255, 0.3);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            display: none; /* Default sembunyi */
            overflow: hidden;
            z-index: 10;
        }
        .glass-card.active { display: block; }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .btn-back {
            margin-top: 30px;
            text-decoration: none;
            color: #00f2ff;
            font-weight: 700;
            border-bottom: 1px solid #00f2ff;
            transition: 0.3s;
            z-index: 10;
        }
        .btn-back:hover { opacity: 0.6; }

        /* --- EFEK BACKGROUND (Opsional) --- */
        .bg-glow {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 500px; height: 500px; background: radial-gradient(circle, rgba(0,242,255,0.1) 0%, transparent 70%);
            z-index: 1; pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="header">
        <h1>Tugas 4</h1>
        <p>Taufik Rahman | 2310715210008 | Sosial Ekonomi Perikanan</p>
    </div>

    <div class="tab-container">
        <button class="tab-btn active" onclick="showContent(event, 'gform')">1. Input Data</button>
        <button class="tab-btn" onclick="showContent(event, 'gsheet')">2. Spreadsheet</button>
        <button class="tab-btn" onclick="showContent(event, 'looker')">3. Dashboard Loker Studio</button>
    </div>

    <div id="gform" class="glass-card active">
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSewPSJlNO8He4ffNWFv8iGWRp4ETnxcTWScUL8JDqZyf-qvDA/viewform?embedded=true">Memuat…</iframe>
    </div>

    <div id="gsheet" class="glass-card">
        <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTlz7jGKsSDK2Zs_CKQu_z2FsJ8T88qmEOEtn1T1aiutErp0weJVVdBlGQOXxXejvFfp0mNoCi4Y8yf/pubhtml?widget=true&amp;headers=false"></iframe>
    </div>

    <div id="looker" class="glass-card">
        <iframe src="https://datastudio.google.com/embed/reporting/d84aaac0-f655-4e52-a997-3994d4ef6c2c/page/page_12345" allowfullscreen sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox"></iframe>
    </div>

    <a href="../index.html" class="btn-back">⬅ KEMBALI KE BERANDA UTAMA</a>

    <script>
        function showContent(evt, contentId) {
            var i, glassCard, tabBtn;
            
            // Sembunyikan semua card
            glassCard = document.getElementsByClassName("glass-card");
            for (i = 0; i < glassCard.length; i++) {
                glassCard[i].style.display = "none";
            }

            // Hapus class active dari semua tombol
            tabBtn = document.getElementsByClassName("tab-btn");
            for (i = 0; i < tabBtn.length; i++) {
                tabBtn[i].className = tabBtn[i].className.replace(" active", "");
            }

            // Tampilkan card yang dipilih & tambah class active pada tombol
            document.getElementById(contentId).style.display = "block";
            evt.currentTarget.className += " active";
        }
    </script>
</body>
</html>
