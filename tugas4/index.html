<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas 4 | Taufik Rahman</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #080b12 0%, #0a192f 50%, #001d3d 100%);
            background-size: 300% 300%;
            overflow: hidden;
            position: relative;
            animation: moveBg 10s ease infinite, color_explosion 4s infinite;
        }

        @keyframes color_explosion {
            0%, 44% { filter: hue-rotate(0deg) contrast(100%); }
            44.5% { filter: hue-rotate(45deg) contrast(150%) brightness(120%); } 
            46%, 100% { filter: hue-rotate(0deg) contrast(100%); }
        }

        @keyframes moveBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- HUJAN BADAI --- */
        body::after {
            content: "";
            position: absolute;
            top: -100%; left: -100%; width: 300%; height: 300%;
            background-image: linear-gradient(rgba(255,255,255,0.3) 1px, transparent 1px);
            background-size: 2px 40px;
            z-index: 5;
            transform: rotate(25deg);
            animation: rain_wind 0.15s linear infinite;
            pointer-events: none;
        }

        @keyframes rain_wind {
            0% { background-position: 0 0; }
            100% { background-position: 0 1000px; }
        }

        /* --- KABUT & KILAT --- */
        .flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; opacity: 0; z-index: 2; animation: bg_flash 4s infinite;
        }
        @keyframes bg_flash { 44% { opacity: 0; } 44.5% { opacity: 0.8; } 45% { opacity: 0; } 45.5% { opacity: 0.9; } 46% { opacity: 0; } }

        /* --- PETIR --- */
        .bolt {
            position: absolute; top: 0; height: 100vh; background: #fff;
            clip-path: polygon(50% 0%, 20% 40%, 60% 40%, 10% 100%, 80% 30%, 40% 30%);
            opacity: 0; z-index: 3; animation: strike 4s infinite;
        }
        .bolt-main { left: 45%; width: 150px; filter: drop-shadow(0 0 100px #fff); }
        @keyframes strike { 0%, 44% { opacity: 0; transform: scaleY(0); } 44.5% { opacity: 1; transform: scaleY(1) scale(1.5); } 46%, 100% { opacity: 0; } }

        /* --- KARTU UTAMA --- */
        .glass-card {
            background: rgba(10, 15, 30, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 30px;
            width: 90%;
            max-width: 900px;
            text-align: center;
            color: white;
            z-index: 20;
            position: relative;
            border: 1px solid rgba(0, 242, 255, 0.3);
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.2);
        }

        h1 { 
            font-size: 24px; letter-spacing: 2px; color: #00f2ff; text-transform: uppercase; margin-bottom: 15px;
        }

        /* --- TEMPAT GOOGLE FORM --- */
        .form-container {
            width: 100%;
            height: 550px;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid rgba(0, 242, 255, 0.5);
            background: #fff;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .btn-back {
            display: inline-block;
            text-decoration: none;
            color: #00f2ff;
            margin-top: 20px;
            font-weight: 700;
            padding: 10px 20px;
            border: 1px solid #00f2ff;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn-back:hover {
            background: #00f2ff;
            color: #080b12;
            box-shadow: 0 0 20px #00f2ff;
        }
    </style>
</head>
<body>

    <div class="flash"></div>
    <div class="bolt bolt-main"></div>

    <div class="glass-card">
        <h1>TUGAS 4 - GOOGLE FORM SURVEY</h1>
        <p style="font-size: 14px; opacity: 0.8; margin-bottom: 20px;">Taufik Rahman | 2310715210008</p>

        <div class="form-container">
            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSewPSJlNO8He4ffNWFv8iGWRp4ETnxcTWScUL8JDqZyf-qvDA/viewform?embedded=true">Memuat…</iframe>
        </div>

        <a href="../index.html" class="btn-back">⬅ KEMBALI KE BERANDA</a>
    </div>

</body>
</html>
