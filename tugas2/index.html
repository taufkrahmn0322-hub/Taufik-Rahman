<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas 2 | Taufik Rahman</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #080b12 0%, #0a192f 50%, #001d3d 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .header { text-align: center; margin-bottom: 30px; }
        h1 { margin: 0; color: #00f2ff; text-transform: uppercase; letter-spacing: 2px; }
        
        /* --- TAB NAVIGASI --- */
        .tab-container {
            display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; justify-content: center;
        }
        .tab-btn {
            padding: 12px 25px; border: 1px solid #00f2ff; background: rgba(0, 242, 255, 0.05);
            color: #00f2ff; cursor: pointer; font-weight: 600; border-radius: 8px; transition: 0.3s;
        }
        .tab-btn.active {
            background: #00f2ff; color: #080b12; box-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
        }

        /* --- KONTEN AREA --- */
        .glass-card {
            background: rgba(10, 15, 30, 0.85);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            width: 100%;
            max-width: 800px;
            border: 1px solid rgba(0, 242, 255, 0.3);
            display: none; 
            padding: 25px;
            box-sizing: border-box;
        }
        .glass-card.active { display: block; }

        /* --- STYLE FORM DALAM TAB (ADAPTASI DARI KODE ASLI) --- */
        fieldset { border: 1px solid rgba(0, 242, 255, 0.3); border-radius: 10px; margin-bottom: 20px; background: rgba(255,255,255,0.02); }
        legend { color: #00f2ff; padding: 0 10px; font-weight: bold; }
        label { display: block; margin: 10px 0 5px; font-size: 14px; }
        input, textarea, select { 
            width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #444; 
            background: rgba(255,255,255,0.1); color: white; box-sizing: border-box;
        }
        input:focus { border-color: #00f2ff; outline: none; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        button[type="submit"] {
            width: 100%; padding: 15px; background: #00f2ff; color: #080b12; 
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button[type="submit"]:hover { box-shadow: 0 0 20px #00f2ff; transform: scale(1.02); }

        iframe { width: 100%; height: 600px; border: none; border-radius: 10px; }
        
        .btn-back { margin-top: 30px; text-decoration: none; color: #00f2ff; font-weight: 700; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Tugas 2</h1>
        <p>Taufik Rahman | 2310715210008 | Sosial Ekonomi Perikanan</p>
    </div>

    <div class="tab-container">
        <button class="tab-btn active" onclick="showContent(event, 'tab-form')">1. Formulir Input</button>
    
    </div>

    <div id="tab-form" class="glass-card active">
        <form id="pendataanForm">
            <fieldset>
                <legend>Data Demografi</legend>
                <label>Nama Pengguna</label>
                <input type="text" name="nama" required>
                <label>Tanggal Lahir</label>
                <input type="date" name="tgl_lahir" required>
                <label>Alamat Lengkap</label>
                <textarea name="alamat" rows="2" required></textarea>
                <div class="grid-2">
                    <div><label>No. Telepon</label><input type="tel" name="telepon" required></div>
                    <div><label>Email</label><input type="email" name="email" required></div>
                </div>
            </fieldset>

            <fieldset>
                <legend>Data Transaksi</legend>
                <label>Uraian Transaksi</label>
                <input type="text" name="uraian" placeholder="Contoh: Jual Ikan Nila" required>
                <div class="grid-2">
                    <div><label>Debet (Rp)</label><input type="number" name="debet" value="0"></div>
                    <div><label>Kredit (Rp)</label><input type="number" name="kredit" value="0"></div>
                </div>
            </fieldset>

            <button type="submit" id="btnSubmit">Simpan Ke Google Sheets</button>
            <p id="loadingMsg" style="display:none; text-align:center; color:#00f2ff;">Mengirim data...</p>
        </form>
    </div>


    <a href="../index.html" class="btn-back">⬅ KEMBALI KE BERANDA</a>

    <script>
        // LOGIKA TAB
        function showContent(evt, contentId) {
            var i, glassCard, tabBtn;
            glassCard = document.getElementsByClassName("glass-card");
            for (i = 0; i < glassCard.length; i++) { glassCard[i].style.display = "none"; }
            tabBtn = document.getElementsByClassName("tab-btn");
            for (i = 0; i < tabBtn.length; i++) { tabBtn[i].className = tabBtn[i].className.replace(" active", ""); }
            document.getElementById(contentId).style.display = "block";
            evt.currentTarget.className += " active";
        }

        // LOGIKA KIRIM DATA (URL SCRIPT KAMU)
        const scriptURL = 'https://script.google.com/macros/s/AKfycbynh6XFAYB8XdbPjoAy8rGuaI4uy7y07T0McebEPJJ65qw0qXPXZrMKODiaQKsXZ_IDaw/exec';
        const form = document.getElementById('pendataanForm');
        const btnSubmit = document.getElementById('btnSubmit');
        const loadingMsg = document.getElementById('loadingMsg');

        form.addEventListener('submit', e => {
            e.preventDefault();
            btnSubmit.disabled = true;
            loadingMsg.style.display = 'block';
            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    alert('Data Berhasil Masuk Database!');
                    form.reset();
                    btnSubmit.disabled = false;
                    loadingMsg.style.display = 'none';
                })
                .catch(error => {
                    alert('Gagal mengirim data!');
                    btnSubmit.disabled = false;
                    loadingMsg.style.display = 'none';
                });
        });
    </script>
</body>
</html>
